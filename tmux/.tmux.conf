# True color: tmux-256color inside tmux, passthrough RGB to the outer terminal
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Reduce Escape key delay (default 500ms causes noticeable lag in vim)
set -sg escape-time 10

# Pass focus events through to vim/nvim (needed for autoread & FocusGained autocmds)
set -g focus-events on

unbind C-b
set -g prefix C-a
bind-key C-a send-prefix

set -g mouse on

unbind %
bind '\' split-window -h -c '#{pane_current_path}'

unbind '"'
bind - split-window -v -c '#{pane_current_path}'

unbind r 
bind r source-file ~/.tmux.conf

bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r h resize-pane -L 5
bind -r l resize-pane -R 5

bind -r m resize-pane -Z

# Copy vim movements
set-window-option -g mode-keys vi

bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection

unbind -T copy-mode-vi MouseDragEnd1Pane

# Clear screen + scrollback (works in nested tmux with C-a C-a L)
bind L send-keys -R \; clear-history

# switch windows with prefix + Left/Right (repeatable)
# bind both Left and C-Left so it works whether or not Ctrl is held after prefix
bind -r Left previous-window
bind -r Right next-window
bind -r C-Left previous-window
bind -r C-Right next-window

# new window
bind c new-window -c '#{pane_current_path}'

# start from 1, not 0
set-option -g base-index 1
# re-number when closing windows
set-option -g renumber-windows on

# open a note for billion $ idea
bind -r e split-window -h "nvim ~/Documents/git/scratch/notes_$(date +'%y%m%d%H').md"
# a quick todo list for today
bind -r o split-window -h "nvim ~/Documents/git/scratch/todo_$(date +'%y%m%d').md"
# open a vim window on the right
bind -r v split-window -h -c "#{pane_current_path}" "zsh -c 'nvim; exec zsh'"

# plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
# save tmux session even tmux-server is killed
# leader + ctrl + s for saving from tmux-resurrect
# leader + ctrl + r for reload from tmux-resurrect
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'catppuccin/tmux#v2.1.2'
set -g @plugin 'xamut/tmux-weather'

# Pane borders - highlight active pane
set -g pane-border-status top
set -g pane-border-lines double
set -g @catppuccin_pane_border_style "fg=#{@thm_surface_1}"
set -g @catppuccin_pane_active_border_style "fg=#ffffff,bold"
set -g pane-border-format "#[align=centre] #{?pane_active,#[fg=#ffffff]#[bold]⭐#[default],#[fg=#{@thm_surface_1}]⭐#[default]} #{?pane_active,#[fg=#ffffff]#[bg=#8b0000]#[bold] #{pane_current_command} #[default],#[fg=#{@thm_surface_1}]#{pane_current_command}#[default]} #{?pane_active,#[fg=#ffffff]#[bold]⭐#[default],#[fg=#{@thm_surface_1}]⭐#[default]}"

# status bar 
# Configure the catppuccin plugin
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"

set -g window-status-separator ""  # Removes the space between windows

set -g status-left-length 120
#set -g status-left "#[bg=#{@thm_green},fg=#{@thm_crust}]#[reverse]#[noreverse]#S #[fg=#{@thm_green},bg=#{@thm_sapphire}]#[fg=#{@thm_crust},bg=#{@thm_sapphire}] #{s|$HOME|~|:pane_current_path} "
set -g status-left "#[bg=#{@thm_sapphire},fg=#{@thm_crust}]#[reverse]#[noreverse]#S "

set -g status-style fg=default,bg=default
set -g status-interval 15
set -g status-right-length 80 #character length

set -g status-right ""
set -agF status-right "#{E:@catppuccin_status_weather}"
set -agF status-right "#[bg=#{@thm_yellow},fg=#{@thm_crust}]#[reverse]█#[noreverse] CPU "
set -agF status-right "#[fg=#{@thm_fg},bg=#{@thm_mantle}] #(/Users/kdvu/.config/tmux/scripts/cpu.sh)%% "
set -agF status-right "#[bg=#{@thm_peach},fg=#{@thm_crust}]#[reverse]█#[noreverse] Mem "
set -agF status-right "#[fg=#cdd6f4,bg=#181825] #(/Users/kdvu/.config/tmux/scripts/mem.sh)%% "
set -agF status-right "#[bg=#{@thm_green},fg=#{@thm_crust}]#[reverse]█#[noreverse] Date "
set -agF status-right "#[fg=#{@thm_fg},bg=#{@thm_mantle}] %d/%m %H:%M "


# Allow escape sequences (e.g. OSC 7 for cwd) to pass through to the terminal
set -g allow-passthrough on

# This line need to be in bottom of the file
run '~/.tmux/plugins/tpm/tpm'
